name: chaos-monthly

on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:
    inputs:
      apply:
        description: Run live chaos injections (staging only)
        required: false
        default: "false"

jobs:
  chaos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install query benchmark deps
        run: |
          python -m pip install --upgrade pip
          pip install -r query/benchmarks/requirements.txt

      - name: Chaos suite dry-run
        if: ${{ github.event.inputs.apply != 'true' }}
        run: python scripts/chaos/chaos_suite.py --dry-run

      - name: Chaos suite apply (staging)
        if: ${{ github.event.inputs.apply == 'true' }}
        env:
          QUERY_BASE_URL: ${{ vars.CHAOS_QUERY_URL }}
          INGEST_BASE_URL: ${{ vars.CHAOS_INGEST_URL }}
          CHAOS_APPLY: "1"
        run: ./scripts/run-chaos.sh --apply
