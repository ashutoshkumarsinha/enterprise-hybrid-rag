# PR / push — unit + contract + stub benchmark (spec §19.6, docs/TESTING.md)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            query/requirements.txt
            query/requirements-dev.txt
            ingest/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r query/requirements.txt -r query/requirements-dev.txt
          pip install -r ingest/requirements.txt pytest

      - name: Unit + contract tests
        run: ./scripts/ci-pr.sh

      - name: Lint (Ruff + Black)
        run: |
          pip install ruff black
          make lint

  benchmark-pr:
    runs-on: ubuntu-latest
    needs: unit-contract
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: query/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r query/requirements.txt
          pip install -r ingest/requirements.txt

      - name: PR benchmarks (query + ingest)
        run: |
          make benchmark-pr
          make benchmark-ingest-pr
