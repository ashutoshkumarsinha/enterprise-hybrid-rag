# Nightly — integration + Ragas + baseline compare (spec §19.6)
# Live-stack gates require self-hosted runner with `make bootstrap` or workflow_dispatch env.
name: Nightly

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      live_stack_strict:
        description: Fail when LIVE_STACK backends are unavailable
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: nightly-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      LIVE_STACK: "1"
      LIVE_STACK_STRICT: ${{ github.event.inputs.live_stack_strict || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            query/requirements.txt
            query/requirements-dev.txt
            query/benchmarks/requirements.txt
            ingest/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r query/requirements.txt -r query/requirements-dev.txt
          pip install -r query/benchmarks/requirements.txt
          pip install -r ingest/requirements.txt pytest

      - name: Nightly test + benchmark pipeline
        run: ./scripts/ci-nightly.sh

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-benchmarks
          path: |
            query/benchmarks/last_run.json
            query/benchmarks/last_ragas.json
          if-no-files-found: ignore

  live-stack:
    runs-on: ubuntu-latest
    needs: quality-gates
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 120
    env:
      LIVE_STACK: "1"
      LIVE_STACK_STRICT: ${{ github.event.inputs.live_stack_strict || 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Live pre-release gate (self-hosted: docker + make bootstrap)
        run: |
          echo "Dispatch-only live job."
          echo "Self-hosted: make env && INFERENCE_PROFILE=dev make bootstrap"
          echo "             make validate-pre-release"
          echo "Or: PRE_RELEASE=1 RAGAS_GATE=1 LOAD_GATE=1 make validate-rag-v1"
          if command -v docker >/dev/null 2>&1; then
            make env
            INFERENCE_PROFILE=dev make bootstrap
            make validate-pre-release
          else
            echo "WARN: docker not available on runner — skipping live stack"
            if [[ "${LIVE_STACK_STRICT}" == "true" ]]; then
              exit 1
            fi
          fi
