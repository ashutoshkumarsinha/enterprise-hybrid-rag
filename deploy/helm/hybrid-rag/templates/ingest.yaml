{{- if .Values.ingest.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hybrid-rag.fullname" . }}-ingest-orchestrator
  labels:
    {{- include "hybrid-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest-orchestrator
spec:
  replicas: {{ .Values.ingest.orchestrator.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: ingest-orchestrator
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: ingest-orchestrator
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: orchestrator
          image: {{ include "hybrid-rag.image" (dict "global" .Values.global "repo" .Values.ingest.image.repository "tag" .Values.ingest.image.tag) }}
          imagePullPolicy: {{ .Values.ingest.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.ingest.orchestrator.port }}
          envFrom:
            - configMapRef:
                name: {{ include "hybrid-rag.fullname" . }}-env
            {{- if .Values.ingest.existingSecret }}
            - secretRef:
                name: {{ .Values.ingest.existingSecret }}
            {{- end }}
          env:
            - name: OTEL_SERVICE_NAME
              value: hybrid-rag-ingest
          readinessProbe:
            httpGet:
              path: /admin/healthz
              port: http
            periodSeconds: 15
          resources:
            {{- toYaml .Values.ingest.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hybrid-rag.fullname" . }}-ingest
  labels:
    {{- include "hybrid-rag.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: ingest-orchestrator
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.ingest.orchestrator.port }}
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hybrid-rag.fullname" . }}-ingest-worker
  labels:
    {{- include "hybrid-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingest-worker
spec:
  replicas: {{ .Values.ingest.worker.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: ingest-worker
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: ingest-worker
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: worker
          image: {{ include "hybrid-rag.image" (dict "global" .Values.global "repo" (printf "%s-worker" .Values.ingest.image.repository) "tag" .Values.ingest.image.tag) }}
          imagePullPolicy: {{ .Values.ingest.image.pullPolicy }}
          command: ["celery", "-A", "app.tasks", "worker", "--loglevel=INFO"]
          envFrom:
            - configMapRef:
                name: {{ include "hybrid-rag.fullname" . }}-env
            {{- if .Values.ingest.existingSecret }}
            - secretRef:
                name: {{ .Values.ingest.existingSecret }}
            {{- end }}
          env:
            - name: CELERY_CONCURRENCY
              value: {{ .Values.ingest.worker.concurrency | quote }}
            - name: OTEL_SERVICE_NAME
              value: hybrid-rag-ingest-worker
          resources:
            {{- toYaml .Values.ingest.resources | nindent 12 }}
{{- end }}
