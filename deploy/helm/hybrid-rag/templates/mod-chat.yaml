{{- if .Values.modChat.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hybrid-rag.fullname" . }}-mod-chat
  labels:
    {{- include "hybrid-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: mod-chat
spec:
  replicas: {{ .Values.modChat.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: mod-chat
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: mod-chat
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: bff
          image: {{ include "hybrid-rag.image" (dict "global" .Values.global "repo" .Values.modChat.image.repository "tag" .Values.modChat.image.tag) }}
          ports:
            - name: bff
              containerPort: {{ .Values.modChat.bffPort }}
          env:
            - name: BFF_PORT
              value: {{ .Values.modChat.bffPort | quote }}
            - name: QUERY_BASE_URL
              value: {{ printf "http://%s-query:%v" (include "hybrid-rag.fullname" .) .Values.query.port | quote }}
            - name: AUTH_STUB
              value: {{ .Values.modChat.authStub | quote }}
            - name: OIDC_ISSUER
              value: {{ .Values.modChat.oidcIssuer | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: bff
        - name: web
          image: {{ include "hybrid-rag.image" (dict "global" .Values.global "repo" .Values.modChat.webImage.repository "tag" .Values.modChat.webImage.tag) }}
          ports:
            - name: web
              containerPort: {{ .Values.modChat.webPort }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hybrid-rag.fullname" . }}-mod-chat
  labels:
    {{- include "hybrid-rag.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: mod-chat
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: bff
      port: {{ .Values.modChat.bffPort }}
      targetPort: bff
    - name: web
      port: 80
      targetPort: web
{{- end }}
