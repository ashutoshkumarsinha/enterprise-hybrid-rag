{{- if and .Values.query.enabled .Values.query.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "hybrid-rag.fullname" . }}-query
  labels:
    {{- include "hybrid-rag.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "hybrid-rag.fullname" . }}-query
  minReplicas: {{ .Values.query.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.query.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.query.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
