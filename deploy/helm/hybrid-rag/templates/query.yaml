{{- if .Values.query.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hybrid-rag.fullname" . }}-query
  labels:
    {{- include "hybrid-rag.labels" . | nindent 4 }}
    app.kubernetes.io/component: query
spec:
  replicas: {{ .Values.query.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: query
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: query
        app.kubernetes.io/instance: {{ .Release.Name }}
        {{- include "hybrid-rag.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ default (printf "%s-sa" (include "hybrid-rag.fullname" .)) .Values.serviceAccount.name }}
      containers:
        - name: query
          image: {{ include "hybrid-rag.image" (dict "global" .Values.global "repo" .Values.query.image.repository "tag" .Values.query.image.tag) }}
          imagePullPolicy: {{ .Values.query.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.query.port }}
          envFrom:
            - configMapRef:
                name: {{ include "hybrid-rag.fullname" . }}-env
            {{- if .Values.query.existingSecret }}
            - secretRef:
                name: {{ .Values.query.existingSecret }}
            {{- end }}
          env:
            - name: QUERY_PORT
              value: {{ .Values.query.port | quote }}
            - name: OTEL_SERVICE_NAME
              value: hybrid-rag-query
            - name: AUTH_REQUIRED
              value: {{ .Values.query.auth.required | quote }}
            - name: JWT_BRIDGE
              value: {{ .Values.query.auth.jwtBridge | quote }}
            - name: SESSIONS_ENABLED
              value: {{ .Values.query.sessions.enabled | quote }}
            - name: SESSION_MAX_AGE_DAYS
              value: {{ .Values.query.sessions.maxAgeDays | quote }}
            - name: QUERY_RATE_LIMIT_ENABLED
              value: {{ .Values.query.rateLimit.enabled | quote }}
            {{- if .Values.query.mtls.enabled }}
            - name: MCP_MTLS_ENABLED
              value: "true"
            - name: MCP_TLS_CERT
              value: /etc/query/mtls/tls.crt
            - name: MCP_TLS_KEY
              value: /etc/query/mtls/tls.key
            - name: MCP_TLS_CLIENT_CA
              value: /etc/query/mtls/ca.crt
            {{- end }}
          {{- if .Values.query.mtls.enabled }}
          volumeMounts:
            - name: query-mtls
              mountPath: /etc/query/mtls
              readOnly: true
          {{- end }}
          {{- if .Values.query.mtls.enabled }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          {{- else }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          {{- end }}
          resources:
            {{- toYaml .Values.query.resources | nindent 12 }}
      {{- if .Values.query.mtls.enabled }}
      volumes:
        - name: query-mtls
          projected:
            sources:
              - secret:
                  name: {{ .Values.query.mtls.certSecret }}
                  items:
                    - key: tls.crt
                      path: tls.crt
                    - key: tls.key
                      path: tls.key
              - secret:
                  name: {{ .Values.query.mtls.caSecret }}
                  items:
                    - key: tls.crt
                      path: ca.crt
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hybrid-rag.fullname" . }}-query
  labels:
    {{- include "hybrid-rag.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/component: query
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.query.port }}
      targetPort: http
{{- end }}
