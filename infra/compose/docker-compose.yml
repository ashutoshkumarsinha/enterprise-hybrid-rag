name: hybrid-rag-infra

networks:
  hybrid-rag-net:
    name: hybrid-rag-net
    driver: bridge

volumes:
  qdrant-data:
  neo4j-data:
  redis-data:
  minio-data:
  postgres-data:

services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks: [hybrid-rag-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.26-community
    ports:
      - "${NEO4J_BOLT_PORT:-7687}:7687"
      - "${NEO4J_HTTP_PORT:-7474}:7474"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/change-me-in-production}
      NEO4J_server_memory_heap_max__size: 4G
      NEO4J_server_memory_pagecache_size: 2G
    volumes:
      - neo4j-data:/data
    networks: [hybrid-rag-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    networks: [hybrid-rag-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-in-production}
      MINIO_BROWSER: ${MINIO_BROWSER:-on}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks: [hybrid-rag-net]
    labels:
      com.hybrid-rag.service: minio
      com.hybrid-rag.role: object-store
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      POSTGRES_DB: ${CATALOG_DB:-catalog}
      INGEST_RW_PASSWORD: ${INGEST_RW_PASSWORD:-change-me-ingest}
      QUERY_RO_PASSWORD: ${QUERY_RO_PASSWORD:-change-me-query}
      QUERY_SESSION_RW_PASSWORD: ${QUERY_SESSION_RW_PASSWORD:-change-me-query-session}
      QUERY_TOKEN_RW_PASSWORD: ${QUERY_TOKEN_RW_PASSWORD:-change-me-query-token}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-change-me-keycloak}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../scripts/postgres-init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    networks: [hybrid-rag-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${KEYCLOAK_PORT:-8081}:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-change-me-keycloak}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-change-me-in-production}
    volumes:
      - ../keycloak/hybrid-rag-realm.json:/opt/keycloak/data/import/hybrid-rag-realm.json:ro
    networks: [hybrid-rag-net]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '{ printf \"GET /health/ready HTTP/1.0\\r\\n\\r\\n\"; } | timeout 2 cat < /dev/tcp/127.0.0.1/8080 | grep -q UP'"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s

  caddy:
    image: caddy:2.8-alpine
    profiles: ["edge"]
    ports:
      - "${CADDY_HTTP_PORT:-8080}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [hybrid-rag-net]
