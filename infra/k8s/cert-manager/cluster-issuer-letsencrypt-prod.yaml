# Let's Encrypt production issuer — public ingress TLS (DNS-01 or HTTP-01 required).
# Set cert-manager.certificates.ingress.issuerRef.name=letsencrypt-prod in Helm values.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: ops@example.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
