global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/prometheus-rules.yaml

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          service: hybrid-rag-observability

  - job_name: otel-collector-internal
    static_configs:
      - targets: ["otel-collector:8888"]
