name: hybrid-rag-query

networks:
  hybrid-rag-net:
    name: hybrid-rag-net
    external: true

services:
  query:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${QUERY_PORT:-8010}:8010"
    environment:
      QUERY_PORT: "8010"
      MCP_NAME: enterprise-hybrid-rag
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      CATALOG_DSN_RO: ${CATALOG_DSN_RO}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-hybrid-rag-query}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-change-me-query-minio}
      MINIO_BUCKET: ${MINIO_BUCKET:-hybrid-rag}
      MINIO_PRESIGN_TTL_SECONDS: ${MINIO_PRESIGN_TTL_SECONDS:-3600}
      VLLM_URL: ${VLLM_URL:-http://chat-llm:8000/v1}
      VLLM_EMBED_URL: ${VLLM_EMBED_URL:-http://embedding:8001/v1}
      RERANKER_URL: ${RERANKER_URL:-http://reranker:8091}
      RERANKER_FAST_URL: ${RERANKER_FAST_URL:-http://reranker-fast:8092}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
      LANGCHAIN_TRACING_V2: ${LANGCHAIN_TRACING_V2:-false}
      LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY:-}
      LANGCHAIN_PROJECT: ${LANGCHAIN_PROJECT:-hybrid-rag-query}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-hybrid-rag-query}
      OTEL_TRACES_EXPORTER: otlp
      DEPLOY_ENV: ${DEPLOY_ENV:-dev}
    networks: [hybrid-rag-net]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8010/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
